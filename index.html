<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gfycat Wayback Retriever</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      color: #888;
      margin-bottom: 36px;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 680px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #5865f2;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: #4752c4; }
    button:disabled { background: #3a3f6e; cursor: not-allowed; }

    /* Status */
    #status-section { margin-top: 24px; display: none; }

    .status-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 6px;
    }

    .progress-text {
      font-size: 0.92rem;
      color: #c8d0e0;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 12px 14px;
      min-height: 44px;
      word-break: break-word;
    }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #5865f2;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    #result-section { margin-top: 24px; display: none; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .result-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }

    .copy-btn {
      margin-top: 0;
      width: auto;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 500;
      background: #2a2d3a;
      border-radius: 6px;
    }
    .copy-btn:hover:not(:disabled) { background: #363a4f; }

    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.875rem;
      padding: 14px;
      resize: vertical;
      min-height: 200px;
      outline: none;
    }

    .url-map { margin-top: 20px; }
    .url-map-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 8px;
    }
    .url-row {
      font-size: 0.82rem;
      color: #aaa;
      border-top: 1px solid #2a2d3a;
      padding: 8px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .url-row a { color: #7289da; text-decoration: none; word-break: break-all; }
    .url-row a:hover { text-decoration: underline; }
    .arrow { color: #555; flex-shrink: 0; }

    .error-text {
      color: #f47c7c;
      font-size: 0.92rem;
    }

    .no-body-note {
      color: #888;
      font-size: 0.88rem;
      font-style: italic;
      padding: 10px 0;
    }
  </style>
</head>
<body>

  <h1>Gfycat Wayback Retriever</h1>
  <p class="subtitle">Paste a Reddit thread URL to recover archived Gfycat links via the Wayback Machine</p>

  <div class="card">
    <label for="reddit-url">Reddit thread URL</label>
    <input
      type="text"
      id="reddit-url"
      placeholder="https://www.reddit.com/r/..."
      autocomplete="off"
      spellcheck="false"
    />
    <button id="submit-btn" onclick="submitJob()">Retrieve Links</button>
  </div>

  <div class="card" id="status-section">
    <div class="status-label">Status</div>
    <div class="progress-text" id="progress-text">
      <span class="spinner" id="spinner"></span>
      <span id="progress-msg">Starting…</span>
    </div>
  </div>

  <div class="card" id="result-section">
    <div id="result-body-section">
      <div class="result-header">
        <span class="result-label">Updated post body</span>
        <button class="copy-btn" onclick="copyBody()">Copy</button>
      </div>
      <textarea id="result-body" readonly></textarea>
    </div>

    <div class="url-map" id="url-map-section">
      <div class="url-map-title">URL Map</div>
      <div id="url-map-rows"></div>
    </div>
  </div>

  <script>
    // -----------------------------------------------------------------------
    // CONFIG — update this to your Render backend URL once deployed
    // -----------------------------------------------------------------------
    const API_BASE = "https://gfycat-backend.onrender.com";

    // -----------------------------------------------------------------------

    let pollInterval = null;

    function setRunning(running) {
      document.getElementById("submit-btn").disabled = running;
    }

    function showStatus(msg, isError = false) {
      const section = document.getElementById("status-section");
      const spinner = document.getElementById("spinner");
      const text    = document.getElementById("progress-msg");
      section.style.display = "block";
      spinner.style.display = isError ? "none" : "inline-block";
      text.textContent = msg;
      if (isError) text.classList.add("error-text");
      else         text.classList.remove("error-text");
    }

    async function submitJob() {
      const url = document.getElementById("reddit-url").value.trim();
      if (!url) return;

      // Reset UI
      document.getElementById("result-section").style.display = "none";
      document.getElementById("url-map-rows").innerHTML = "";
      document.getElementById("result-body").value = "";
      if (pollInterval) clearInterval(pollInterval);
      setRunning(true);
      showStatus("Submitting job…");

      let jobId;
      try {
        const res  = await fetch(`${API_BASE}/jobs`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ reddit_url: url }),
        });
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const data = await res.json();
        jobId = data.job_id;
      } catch (err) {
        showStatus(`Failed to contact backend: ${err.message}`, true);
        setRunning(false);
        return;
      }

      // Poll every 4 seconds
      pollInterval = setInterval(() => pollJob(jobId), 4000);
    }

    async function pollJob(jobId) {
      let data;
      try {
        const res = await fetch(`${API_BASE}/jobs/${jobId}`);
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        data = await res.json();
      } catch (err) {
        showStatus(`Polling error: ${err.message}`, true);
        clearInterval(pollInterval);
        setRunning(false);
        return;
      }

      showStatus(data.progress || data.state);

      if (data.state === "complete") {
        clearInterval(pollInterval);
        setRunning(false);
        document.getElementById("spinner").style.display = "none";
        renderResult(data);
      } else if (data.state === "failed") {
        clearInterval(pollInterval);
        setRunning(false);
        showStatus(data.error || "Job failed.", true);
      }
    }

    function renderResult(data) {
      const section = document.getElementById("result-section");
      section.style.display = "block";

      // Updated body
      const bodySection = document.getElementById("result-body-section");
      const bodyArea    = document.getElementById("result-body");
      if (data.updated_body) {
        bodyArea.value = data.updated_body;
        bodySection.style.display = "block";
      } else {
        bodySection.style.display = "none";
      }

      // URL map table
      const rows    = document.getElementById("url-map-rows");
      const urlMap  = data.url_map || {};
      const entries = Object.entries(urlMap);

      if (entries.length === 0) {
        rows.innerHTML = "<div class='url-row' style='color:#888'>No URLs were successfully retrieved.</div>";
      } else {
        rows.innerHTML = entries.map(([gfy, catbox]) => `
          <div class="url-row">
            <a href="${gfy}" target="_blank" rel="noopener">${gfy}</a>
            <span class="arrow">→</span>
            <a href="${catbox}" target="_blank" rel="noopener">${catbox}</a>
          </div>
        `).join("");
      }
    }

    function copyBody() {
      const text = document.getElementById("result-body").value;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 2000);
      });
    }
  </script>

</body>
</html>
